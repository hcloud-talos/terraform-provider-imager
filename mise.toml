[tools]
go = "1.26.0"
hk = "1.36.0"
pkl = "0.30.2"
golangci-lint = "2.10.1"

[tasks.test]
description = "Run unit tests"
run = "go test ./..."

[tasks."test:acc"]
description = "Run acceptance tests (creates real Hetzner Cloud resources)"
confirm = "This will create real Hetzner Cloud resources (billable). Continue?"
env = { TF_ACC = "1" }
run = "go test ./... -run TestAcc -count=1"

[tasks.check]
description = "Run repo checks (format, tidy, lint, tests)"
run = "hk check --all"

[tasks.fix]
description = "Auto-fix formatting and lint"
run = "hk fix --all"

[tasks.hooks]
description = "Install git hooks (via hk, using mise)"
run = "hk install --mise"

[tasks.build]
description = "Build the Terraform provider"
run = "go build ./cmd/terraform-provider-imager"

[tasks.cleanup]
description = "Cleanup leaked Hetzner Cloud resources (requires HCLOUD_TOKEN)"
run = "go run ./cmd/imager-cleanup"

[tasks."docs:gen"]
description = "Generate Terraform Registry docs into docs/"
run = """
mkdir -p .cache/gomod .cache/gocache .cache/gopath .cache/home .cache/xdg .cache/tfplugindocs && \
env GOPATH="$PWD/.cache/gopath" \
  GOMODCACHE="$PWD/.cache/gomod" \
  GOCACHE="$PWD/.cache/gocache" \
  HOME="$PWD/.cache/home" \
  XDG_CACHE_HOME="$PWD/.cache/xdg" \
  go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0 generate \
    --provider-dir cmd/terraform-provider-imager \
    --provider-name imager \
    --tf-version 1.9.0 \
    --examples-dir ../../examples \
    --website-source-dir ../../templates \
    --rendered-website-dir ../../docs \
    --website-temp-dir .cache/tfplugindocs
"""

[tasks."docs:check"]
description = "Verify docs/ is up to date"
run = "mise run docs:gen && git diff --exit-code -- docs/"
